<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>alphaz.space</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="js/api.js"></script>
  </head>
  <body>
    <header class="site">
      <h1>alphaz.space</h1>
      <nav>
        <a href="home">Home</a>
      </nav>
    </header>
    <main>
      <p class="muted">Private streams for verified Discord members.</p>
      <p>
        <a class="btn btn-primary" href="#" id="login">Sign in with Discord</a>
      </p>
    </main>
    <script>
      document.getElementById("login").href = AlphazApi.loginUrl();
      if (AlphazApi.getToken()) {
        window.location.replace("home");
      }
    </script>
  </body>
</html>
