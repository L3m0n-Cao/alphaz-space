<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — alphaz.space</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="js/api.js"></script>
  </head>
  <body>
    <header class="site">
      <h1>alphaz.space</h1>
      <nav>
        <a href="index">Back</a>
      </nav>
    </header>
    <main>
      <p id="err" class="error" style="display: none"></p>
      <p class="muted">You must be in the configured Discord server to continue.</p>
      <p>
        <a class="btn btn-primary" href="#" id="login">Sign in with Discord</a>
      </p>
      <p class="muted"><a href="unauthorized">Not eligible?</a></p>
    </main>
    <script>
      document.getElementById("login").href = AlphazApi.loginUrl();
      if (AlphazApi.getToken()) {
        window.location.replace("home");
      }
      const q = new URLSearchParams(location.search);
      const err = q.get("error");
      const map = {
        not_in_server: "You are not in the required Discord server.",
        discord_denied: "Discord authorization was cancelled.",
        invalid_oauth: "Invalid OAuth state. Try again.",
        oauth_failed: "Login failed. Try again.",
      };
      if (err && map[err]) {
        const el = document.getElementById("err");
        el.style.display = "block";
        el.textContent = map[err];
      }
    </script>
  </body>
</html>
