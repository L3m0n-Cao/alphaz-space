<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Live — alphaz.space</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="js/api.js"></script>
  </head>
  <body>
    <header class="site">
      <h1 id="title">Live</h1>
      <nav>
        <a href="home">Home</a>
      </nav>
    </header>
    <main>
      <p id="msg" class="muted"></p>
      <button id="fallbackBtn" type="button" class="btn btn-ghost btn-sm" hidden>Reload in Compatibility Mode</button>
      <div id="videoContainer"></div>
    </main>
    <script>
      async function fetchKickPlaybackUrl(kickUsername) {
        const url = "https://kick.com/api/v2/channels/" + encodeURIComponent(kickUsername) + "/playback-url";
        const res = await fetch(url, {
          headers: {
            Accept: "application/json",
          },
        });
        if (!res.ok) {
          throw new Error("Kick playback-url " + res.status);
        }
        const json = await res.json();
        const data = json && json.data;
        if (typeof data !== "string" || !data.startsWith("http")) {
          throw new Error("Kick playback-url missing data URL");
        }
        return data;
      }

      (async function () {
        const msgEl = document.getElementById("msg");
        const fallbackBtn = document.getElementById("fallbackBtn");
        let hasFallbackBeenShown = false;
        const params = new URLSearchParams(location.search);
        const compatibilityMode = params.get("compatibility") === "1";

        function logFallback(event, details) {
          try {
            console.log("[live:fallback]", event, details || "");
          } catch (_) {}
        }

        logFallback("init", {
          href: location.href,
          compatibilityMode,
        });

        // Seed a default target so clicks always have a deterministic navigation path.
        fallbackBtn.setAttribute("data-target-url", getCompatibilityModeUrl(!compatibilityMode));

        fallbackBtn.addEventListener("click", function () {
          const targetUrl = fallbackBtn.getAttribute("data-target-url") || getCompatibilityModeUrl(!compatibilityMode);
          logFallback("button-click", {
            hidden: fallbackBtn.hidden,
            disabled: fallbackBtn.disabled,
            targetUrl,
          });
          if (!targetUrl) return;
          fallbackBtn.disabled = true;
          logFallback("navigate", { to: targetUrl });
          location.href = targetUrl;
        });

        function getCompatibilityModeUrl(enabled) {
          const next = new URL(location.href);
          if (enabled) next.searchParams.set("compatibility", "1");
          else next.searchParams.delete("compatibility");
          return next.toString();
        }

        const id = new URLSearchParams(location.search).get("l");
        if (!id) {
          msgEl.textContent = "Missing livestream id.";
          return;
        }
        let data;
        try {
          data = await AlphazApi.getJson("/api/livestreams/" + encodeURIComponent(id));
        } catch (_) {
          return;
        }
        document.getElementById("title").textContent = data.title || "Live";
        try {
          await AlphazApi.postJson("/api/analytics/view", { type: "live", id: Number(id) });
        } catch (e) {
          console.warn(e);
        }
        if (data.access_denied) {
          msgEl.textContent = "This stream is not available yet, has ended, or was archived.";
          return;
        }
        let playback;
        try {
          const kickPlaybackUrl = await fetchKickPlaybackUrl(data.kick_username);
          playback = await AlphazApi.postJson("/api/livestreams/" + encodeURIComponent(id) + "/playback", {
            kickPlaybackUrl,
          });
        } catch (e) {
          console.error(e);
          msgEl.textContent = "Playback unavailable. Please refresh and try again.";
          return;
        }
        msgEl.textContent =
          "Playback expires around " + new Date(playback.hlsExpiresAt).toLocaleTimeString() + " (refresh page to renew).";

        function bootJwHls() {
          const player = jwplayer("videoContainer");
          player.setup({
            file: playback.playbackUrl,
            type: "hls",
            autostart: false,
            width: "100%",
            aspectratio: "16:9",
          });
        }

        function showFallbackButton(reason) {
          if (hasFallbackBeenShown) return;
          hasFallbackBeenShown = true;
          msgEl.textContent = reason + " Click the button to reload in standard HLS compatibility mode.";
          fallbackBtn.hidden = false;
          fallbackBtn.disabled = false;
          fallbackBtn.textContent = "Reload in Compatibility Mode";
          fallbackBtn.setAttribute("data-target-url", getCompatibilityModeUrl(true));
          logFallback("show-button", {
            reason,
            targetUrl: fallbackBtn.getAttribute("data-target-url"),
          });
        }

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
        }

        function bootJwIvs() {
          const player = jwplayer("videoContainer");
          player.setup({
            playlist: [
              {
                file: playback.playbackUrl,
                type: "ivs",
              },
            ],
            cast: null,
            autostart: false,
            width: "100%",
            aspectratio: "16:9",
          });

          player.on("error", function () {
            showFallbackButton("IVS playback failed.");
          });

          player.on("providerPlayer", function (provider) {
            window.__ivsPlayer__ = provider.ivsPlayer;
            window.__ivsEvents__ = provider.ivsEvents;

            try {
              const eventType = provider.ivsEvents && provider.ivsEvents.PlayerEventType;
              if (provider.ivsPlayer && eventType && eventType.ERROR) {
                provider.ivsPlayer.addEventListener(eventType.ERROR, function () {
                  showFallbackButton("IVS playback encountered an error.");
                });
              }
            } catch (_) {
              // If IVS error hook fails, JW error listener still handles fallback visibility.
            }
          });
        }

        try {
          await loadScript(window.__JW_LIBRARY_URL__);
        } catch (_) {
          msgEl.textContent = "Failed to load JW Player script.";
          return;
        }

        if (compatibilityMode) {
          fallbackBtn.hidden = false;
          fallbackBtn.disabled = false;
          fallbackBtn.textContent = "Try IVS Mode";
          fallbackBtn.setAttribute("data-target-url", getCompatibilityModeUrl(false));
          logFallback("compatibility-mode-active", {
            targetUrl: fallbackBtn.getAttribute("data-target-url"),
          });
          bootJwHls();
          msgEl.textContent =
            "Compatibility mode enabled (standard HLS). Playback expires around " +
            new Date(playback.hlsExpiresAt).toLocaleTimeString() +
            " (refresh page to renew).";
          return;
        }

        try {
          await loadScript(
            window.__IVS_JW_PROVIDER_URL__ ||
              "https://player.live-video.net/1.50.0/amazon-ivs-jw-provider.min.js"
          );
        } catch (_) {
          logFallback("ivs-provider-load-failed");
          showFallbackButton("Amazon IVS provider failed to load.");
          return;
        }

        logFallback("boot-ivs");
        bootJwIvs();
      })();
    </script>
  </body>
</html>
